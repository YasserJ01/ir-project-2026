# IR Project 2026 — Docker Compose
#
# Phase 0 ships ONLY the UI service (production mode, served by nginx).
# The backend services (gateway, preprocessing, indexing, retrieval, refinement, rag)
# are added in Phase 6 (Service-Oriented Architecture).
#
# See docs/DOCKER.md for conventions and the dev-vs-prod workflow.

name: ir-project-2026

services:
  # ─── Frontend (production build via nginx) ──────────────
  ui:
    build:
      context: .
      dockerfile: services/ui/Dockerfile
    image: ir-project-2026/ui:phase0
    container_name: ir_ui
    ports:
      - "3000:80"   # http://localhost:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

