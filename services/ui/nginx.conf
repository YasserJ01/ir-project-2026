server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ─── SPA fallback ───────────────────────────────────
    # All unmatched routes fall back to index.html so React Router
    # can handle them client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── API reverse-proxy (ENABLED IN PHASE 6) ────────
    # When the gateway service is added to docker-compose.yml:
    #   1. Uncomment the block below.
    #   2. Uncomment the `depends_on: gateway` line in docker-compose.yml
    #      under the `ui` service.
    #   3. Uncomment the `networks:` section in docker-compose.yml.
    #
    # location /api/ {
    #     proxy_pass http://gateway:8000/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_read_timeout 60s;
    #     proxy_connect_timeout 5s;
    # }

    # ─── Static asset caching ──────────────────────────
    location ~* \.(?:js|css|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── Security headers ──────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
